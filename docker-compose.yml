services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sg
    ports:
      # 本机若已有 Postgres 占 5432，改用 5433 映射容器 5432
      - '5433:5432'
    volumes:
      - sg_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sg']
      interval: 3s
      timeout: 5s
      retries: 10

  migrate:
    profiles: [migrate]
    image: pgvector/pgvector:pg16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./db/migrations:/migrations:ro
    entrypoint: ['/bin/bash', '-euc']
    command:
      - |
        shopt -s nullglob
        for f in /migrations/*.sql; do
          echo ">> $$f"
          psql -h postgres -U postgres -d sg -v ON_ERROR_STOP=1 -f "$$f"
        done

volumes:
  sg_pg_data:
