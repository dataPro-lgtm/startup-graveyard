openapi: 3.1.0
info:
  title: Startup Graveyard API
  version: 1.0.0
servers:
  - url: http://localhost:8080
components:
  securitySchemes:
    AdminKey:
      type: apiKey
      in: header
      name: X-Admin-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CaseListItem:
      type: object
      required:
        - id
        - slug
        - companyName
        - industry
        - country
        - closedYear
        - summary
        - businessModelKey
        - foundedYear
        - totalFundingUsd
        - primaryFailureReasonKey
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        companyName: { type: string }
        industry: { type: string }
        country: { type: string, nullable: true }
        closedYear: { type: integer, nullable: true }
        summary: { type: string }
        businessModelKey: { type: string, nullable: true }
        foundedYear: { type: integer, nullable: true }
        totalFundingUsd: { type: number, nullable: true }
        primaryFailureReasonKey: { type: string, nullable: true }
    EvidenceSource:
      type: object
      required:
        - id
        - sourceType
        - title
        - url
        - publisher
        - publishedAt
        - credibilityLevel
        - excerpt
      properties:
        id: { type: string, format: uuid }
        sourceType: { type: string }
        title: { type: string }
        url: { type: string }
        publisher: { type: string, nullable: true }
        publishedAt: { type: string, nullable: true }
        credibilityLevel: { type: string }
        excerpt: { type: string, nullable: true }
    FailureFactor:
      type: object
      required:
        - id
        - level1Key
        - level2Key
        - level3Key
        - weight
        - explanation
      properties:
        id: { type: string, format: uuid }
        level1Key: { type: string }
        level2Key: { type: string }
        level3Key: { type: string, nullable: true }
        weight: { type: number }
        explanation: { type: string, nullable: true }
    CaseDetail:
      allOf:
        - $ref: '#/components/schemas/CaseListItem'
        - type: object
          required: [evidenceSources, failureFactors]
          properties:
            evidenceSources:
              type: array
              items: { $ref: '#/components/schemas/EvidenceSource' }
            failureFactors:
              type: array
              items: { $ref: '#/components/schemas/FailureFactor' }
    ListCasesResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/CaseListItem' }
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
    SimilarCasesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/CaseListItem' }
    TaxonomyResponse:
      type: object
      required:
        - industries
        - countries
        - businessModels
        - primaryFailureReasons
        - failureFactorLevel1
        - failureFactorLevel2
        - timelineEventTypes
      properties:
        industries:
          type: object
          additionalProperties: { type: string }
        countries:
          type: object
          additionalProperties: { type: string }
        businessModels:
          type: object
          additionalProperties: { type: string }
        primaryFailureReasons:
          type: object
          additionalProperties: { type: string }
        failureFactorLevel1:
          type: object
          additionalProperties: { type: string }
        failureFactorLevel2:
          type: object
          additionalProperties: { type: string }
        timelineEventTypes:
          type: object
          additionalProperties: { type: string }
    HomeSummary:
      type: object
      required: [totalCases, totalFundingUsd, failurePatterns]
      properties:
        totalCases: { type: integer, minimum: 0 }
        totalFundingUsd: { type: number, minimum: 0 }
        failurePatterns: { type: integer, minimum: 0 }
    ResearchBucket:
      type: object
      required: [key, caseCount, totalFundingUsd]
      properties:
        key: { type: string }
        caseCount: { type: integer, minimum: 0 }
        totalFundingUsd: { type: number, minimum: 0 }
    ResearchTimelinePoint:
      type: object
      required: [year, caseCount, totalFundingUsd]
      properties:
        year: { type: integer }
        caseCount: { type: integer, minimum: 0 }
        totalFundingUsd: { type: number, minimum: 0 }
    ResearchOverview:
      type: object
      required:
        - summary
        - topIndustries
        - topCountries
        - topFailureReasons
        - closureTimeline
      properties:
        summary:
          $ref: '#/components/schemas/HomeSummary'
        topIndustries:
          type: array
          items:
            $ref: '#/components/schemas/ResearchBucket'
        topCountries:
          type: array
          items:
            $ref: '#/components/schemas/ResearchBucket'
        topFailureReasons:
          type: array
          items:
            $ref: '#/components/schemas/ResearchBucket'
        closureTimeline:
          type: array
          items:
            $ref: '#/components/schemas/ResearchTimelinePoint'
    ReviewPublishReadiness:
      type: object
      required: [ready, evidenceCount, failureFactorCount, missing]
      properties:
        ready: { type: boolean }
        evidenceCount: { type: integer, minimum: 0 }
        failureFactorCount: { type: integer, minimum: 0 }
        missing:
          type: array
          items:
            type: string
            enum: [evidence_sources, failure_factors]
    ReviewListItem:
      type: object
      required:
        - id
        - caseId
        - slug
        - companyName
        - reviewStatus
        - assignedTo
        - decisionNote
        - createdAt
        - approvedAt
        - publishReadiness
      properties:
        id: { type: string, format: uuid }
        caseId: { type: string, format: uuid }
        slug: { type: string }
        companyName: { type: string }
        reviewStatus:
          type: string
          enum: [pending, changes_requested, approved, rejected]
        assignedTo: { type: string, nullable: true }
        decisionNote: { type: string, nullable: true }
        createdAt: { type: string }
        approvedAt: { type: string, nullable: true }
        publishReadiness:
          $ref: '#/components/schemas/ReviewPublishReadiness'
    ListReviewsResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReviewListItem'
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1 }
        total: { type: integer, minimum: 0 }
    ApproveReviewSuccess:
      type: object
      required: [ok, reviewId, caseId, status, approvedAt]
      properties:
        ok: { type: boolean, const: true }
        reviewId: { type: string, format: uuid }
        caseId: { type: string, format: uuid }
        status: { type: string, const: approved }
        approvedAt: { type: string }
    ApproveReviewBlocked:
      type: object
      required: [error, caseId, publishReadiness]
      properties:
        error: { type: string, const: publish_requirements_not_met }
        caseId: { type: string, format: uuid }
        publishReadiness:
          $ref: '#/components/schemas/ReviewPublishReadiness'
    ReviewRequestChangesBody:
      type: object
      required: [decisionNote]
      properties:
        decisionNote: { type: string, minLength: 1, maxLength: 4000 }
    ReviewRequestChangesResponse:
      type: object
      required: [reviewId, caseId, status]
      properties:
        reviewId: { type: string, format: uuid }
        caseId: { type: string, format: uuid }
        status: { type: string, const: changes_requested }
    ReviewResubmitResponse:
      type: object
      required: [reviewId, caseId, status]
      properties:
        reviewId: { type: string, format: uuid }
        caseId: { type: string, format: uuid }
        status: { type: string, const: pending }
    ReviewRejectResponse:
      type: object
      required: [reviewId, caseId, status]
      properties:
        reviewId: { type: string, format: uuid }
        caseId: { type: string, format: uuid }
        status: { type: string, const: rejected }
    SourceSnapshotItem:
      type: object
      required:
        - id
        - sourceName
        - sourceUrl
        - finalUrl
        - httpStatus
        - contentType
        - title
        - excerpt
        - contentSha256
        - metadata
        - fetchedAt
        - createdAt
      properties:
        id: { type: string, format: uuid }
        sourceName: { type: string }
        sourceUrl: { type: string }
        finalUrl: { type: string }
        httpStatus: { type: integer, minimum: 100, maximum: 599 }
        contentType: { type: string, nullable: true }
        title: { type: string, nullable: true }
        excerpt: { type: string, nullable: true }
        contentSha256: { type: string }
        metadata:
          type: object
          additionalProperties: true
        fetchedAt: { type: string }
        createdAt: { type: string }
    ListSourceSnapshotsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SourceSnapshotItem'
    UserEntitlements:
      type: object
      required:
        [
          watchlistLimit,
          savedSearchLimit,
          monthlyCopilotQuestions,
          canExportReports,
          canUseSavedSearches,
          canUseWatchlist,
          canUseTeamWorkspace,
          canUseApiAccess,
        ]
      properties:
        watchlistLimit: { type: integer, minimum: 0 }
        savedSearchLimit: { type: integer, minimum: 0 }
        monthlyCopilotQuestions: { type: integer, minimum: 0, nullable: true }
        canExportReports: { type: boolean }
        canUseSavedSearches: { type: boolean }
        canUseWatchlist: { type: boolean }
        canUseTeamWorkspace: { type: boolean }
        canUseApiAccess: { type: boolean }
    UserProfile:
      type: object
      required:
        [
          id,
          email,
          displayName,
          subscription,
          billingStatus,
          billingInterval,
          currentPeriodEnd,
          cancelAtPeriodEnd,
          entitlements,
          role,
          createdAt,
        ]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string, nullable: true }
        subscription:
          type: string
          enum: [free, pro, team]
        billingStatus:
          type: string
          enum: [inactive, trialing, active, past_due, canceled]
        billingInterval:
          type: string
          nullable: true
          enum: [month, year]
        currentPeriodEnd: { type: string, nullable: true }
        cancelAtPeriodEnd: { type: boolean }
        entitlements:
          $ref: '#/components/schemas/UserEntitlements'
        role:
          type: string
          enum: [user, admin]
        createdAt: { type: string }
    AuthResponse:
      type: object
      required: [user, accessToken, refreshToken, expiresIn]
      properties:
        user:
          $ref: '#/components/schemas/UserProfile'
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer, minimum: 1 }
    WatchlistSummary:
      type: object
      required:
        [
          subscription,
          billingStatus,
          watchlistCount,
          watchlistLimit,
          remainingSlots,
          canUseWatchlist,
          canAddMore,
          requiredTier,
        ]
      properties:
        subscription:
          type: string
          enum: [free, pro, team]
        billingStatus:
          type: string
          enum: [inactive, trialing, active, past_due, canceled]
        watchlistCount: { type: integer, minimum: 0 }
        watchlistLimit: { type: integer, minimum: 0 }
        remainingSlots: { type: integer, minimum: 0 }
        canUseWatchlist: { type: boolean }
        canAddMore: { type: boolean }
        requiredTier:
          type: string
          nullable: true
          enum: [free, pro, team]
    WatchlistItem:
      allOf:
        - $ref: '#/components/schemas/CaseListItem'
        - type: object
          required: [addedAt]
          properties:
            addedAt: { type: string }
    WatchlistListResponse:
      type: object
      required: [summary, items]
      properties:
        summary:
          $ref: '#/components/schemas/WatchlistSummary'
        items:
          type: array
          items:
            $ref: '#/components/schemas/WatchlistItem'
    WatchlistStatusResponse:
      type: object
      required: [summary, caseId, saved]
      properties:
        summary:
          $ref: '#/components/schemas/WatchlistSummary'
        caseId: { type: string, format: uuid }
        saved: { type: boolean }
    WatchlistMutationResponse:
      type: object
      required: [ok, summary, caseId, saved]
      properties:
        ok: { type: boolean, enum: [true] }
        summary:
          $ref: '#/components/schemas/WatchlistSummary'
        caseId: { type: string, format: uuid }
        saved: { type: boolean }
    SavedViewSummary:
      type: object
      required:
        [
          subscription,
          billingStatus,
          savedViewCount,
          savedViewLimit,
          remainingSlots,
          canUseSavedViews,
          canAddMore,
          requiredTier,
        ]
      properties:
        subscription:
          type: string
          enum: [free, pro, team]
        billingStatus:
          type: string
          enum: [inactive, trialing, active, past_due, canceled]
        savedViewCount: { type: integer, minimum: 0 }
        savedViewLimit: { type: integer, minimum: 0 }
        remainingSlots: { type: integer, minimum: 0 }
        canUseSavedViews: { type: boolean }
        canAddMore: { type: boolean }
        requiredTier:
          type: string
          nullable: true
          enum: [free, pro, team]
    SavedViewFilters:
      type: object
      properties:
        q: { type: string, minLength: 1, maxLength: 120 }
        industry: { type: string, minLength: 1, maxLength: 80 }
        country: { type: string, minLength: 1, maxLength: 32 }
        closedYear:
          type: string
          pattern: '^\d{4}$'
        businessModelKey: { type: string, minLength: 1, maxLength: 80 }
        primaryFailureReasonKey: { type: string, minLength: 1, maxLength: 80 }
        sort:
          type: string
          enum: [relevance, updated_at]
    SavedViewItem:
      type: object
      required: [id, name, filters, queryString, caseCount, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 80 }
        filters:
          $ref: '#/components/schemas/SavedViewFilters'
        queryString: { type: string }
        caseCount: { type: integer, minimum: 0 }
        createdAt: { type: string }
        updatedAt: { type: string }
    SavedViewListResponse:
      type: object
      required: [summary, items]
      properties:
        summary:
          $ref: '#/components/schemas/SavedViewSummary'
        items:
          type: array
          items:
            $ref: '#/components/schemas/SavedViewItem'
    CreateSavedViewResponse:
      type: object
      required: [ok, created, summary, item]
      properties:
        ok: { type: boolean, enum: [true] }
        created: { type: boolean }
        summary:
          $ref: '#/components/schemas/SavedViewSummary'
        item:
          $ref: '#/components/schemas/SavedViewItem'
    UpdateSavedViewResponse:
      type: object
      required: [ok, summary, item]
      properties:
        ok: { type: boolean, enum: [true] }
        summary:
          $ref: '#/components/schemas/SavedViewSummary'
        item:
          $ref: '#/components/schemas/SavedViewItem'
    DeleteSavedViewResponse:
      type: object
      required: [ok, summary, savedViewId]
      properties:
        ok: { type: boolean, enum: [true] }
        summary:
          $ref: '#/components/schemas/SavedViewSummary'
        savedViewId: { type: string, format: uuid }
    CopilotCitation:
      type: object
      required: [caseId, slug, companyName, relevantText]
      properties:
        caseId: { type: string }
        slug: { type: string }
        companyName: { type: string }
        relevantText: { type: string }
        pinned: { type: boolean }
    CopilotAnswerResponse:
      type: object
      required: [sessionId, userMessageId, assistantMessageId, answer, citations, grounded]
      properties:
        sessionId: { type: string, format: uuid }
        userMessageId: { type: string, format: uuid }
        assistantMessageId: { type: string, format: uuid }
        answer: { type: string }
        citations:
          type: array
          items:
            $ref: '#/components/schemas/CopilotCitation'
        model: { type: string }
        grounded: { type: boolean }
    CopilotSessionSummary:
      type: object
      required: [id, title, messageCount, pinnedCaseCount, updatedAt, createdAt]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        messageCount: { type: integer, minimum: 0 }
        pinnedCaseCount: { type: integer, minimum: 0 }
        lastQuestion: { type: string, nullable: true }
        updatedAt: { type: string }
        createdAt: { type: string }
    CopilotFallbackReason:
      type: string
      enum: [no_relevant_cases, provider_unavailable, provider_error]
    CopilotRunStats:
      type: object
      required:
        [
          provider,
          model,
          promptVersion,
          responseMs,
          promptTokens,
          completionTokens,
          totalTokens,
          estimatedCostUsd,
          retrievedCaseCount,
          pinnedCaseCount,
          citationCount,
          fallbackReason,
          createdAt,
        ]
      properties:
        provider: { type: string, nullable: true }
        model: { type: string, nullable: true }
        promptVersion: { type: string }
        responseMs: { type: integer, minimum: 0 }
        promptTokens: { type: integer, minimum: 0, nullable: true }
        completionTokens: { type: integer, minimum: 0, nullable: true }
        totalTokens: { type: integer, minimum: 0, nullable: true }
        estimatedCostUsd: { type: number, minimum: 0, nullable: true }
        retrievedCaseCount: { type: integer, minimum: 0 }
        pinnedCaseCount: { type: integer, minimum: 0 }
        citationCount: { type: integer, minimum: 0 }
        fallbackReason:
          allOf:
            - $ref: '#/components/schemas/CopilotFallbackReason'
          nullable: true
        createdAt: { type: string }
    CopilotMessage:
      type: object
      required:
        [id, role, content, citations, grounded, model, feedbackVote, feedbackNote, run, createdAt]
      properties:
        id: { type: string, format: uuid }
        role:
          type: string
          enum: [user, assistant]
        content: { type: string }
        citations:
          type: array
          items:
            $ref: '#/components/schemas/CopilotCitation'
        grounded: { type: boolean, nullable: true }
        model: { type: string, nullable: true }
        feedbackVote:
          type: string
          nullable: true
          enum: [up, down]
        feedbackNote: { type: string, nullable: true }
        run:
          allOf:
            - $ref: '#/components/schemas/CopilotRunStats'
          nullable: true
        createdAt: { type: string }
    CopilotSessionDetail:
      type: object
      required: [session, pinnedCases, messages]
      properties:
        session:
          $ref: '#/components/schemas/CopilotSessionSummary'
        pinnedCases:
          type: array
          items:
            $ref: '#/components/schemas/CaseListItem'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/CopilotMessage'
    CopilotSessionsListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CopilotSessionSummary'
    CopilotFeedbackResponse:
      type: object
      required: [ok, messageId, vote, note]
      properties:
        ok: { type: boolean, enum: [true] }
        messageId: { type: string, format: uuid }
        vote:
          type: string
          enum: [up, down]
        note: { type: string, nullable: true }
    CopilotFeedbackEval:
      type: object
      required: [helpful, needsImprovement, unrated, positiveRate]
      properties:
        helpful: { type: integer, minimum: 0 }
        needsImprovement: { type: integer, minimum: 0 }
        unrated: { type: integer, minimum: 0 }
        positiveRate: { type: number, minimum: 0, maximum: 1, nullable: true }
    CopilotOverviewStats:
      type: object
      required:
        [
          totalRuns,
          totalSessions,
          groundedRuns,
          fallbackRuns,
          avgResponseMs,
          avgTotalTokens,
          totalEstimatedCostUsd,
          lastRunAt,
        ]
      properties:
        totalRuns: { type: integer, minimum: 0 }
        totalSessions: { type: integer, minimum: 0 }
        groundedRuns: { type: integer, minimum: 0 }
        fallbackRuns: { type: integer, minimum: 0 }
        avgResponseMs: { type: integer, minimum: 0 }
        avgTotalTokens: { type: integer, minimum: 0 }
        totalEstimatedCostUsd: { type: number, minimum: 0 }
        lastRunAt: { type: string, nullable: true }
    CopilotPromptVersionStats:
      type: object
      required:
        [
          promptVersion,
          runs,
          groundedRuns,
          fallbackRuns,
          avgResponseMs,
          avgTotalTokens,
          totalEstimatedCostUsd,
          positiveFeedback,
          negativeFeedback,
          noFeedback,
          groundedRate,
          positiveRate,
          lastRunAt,
        ]
      properties:
        promptVersion: { type: string }
        runs: { type: integer, minimum: 0 }
        groundedRuns: { type: integer, minimum: 0 }
        fallbackRuns: { type: integer, minimum: 0 }
        avgResponseMs: { type: integer, minimum: 0 }
        avgTotalTokens: { type: integer, minimum: 0 }
        totalEstimatedCostUsd: { type: number, minimum: 0 }
        positiveFeedback: { type: integer, minimum: 0 }
        negativeFeedback: { type: integer, minimum: 0 }
        noFeedback: { type: integer, minimum: 0 }
        groundedRate: { type: number, minimum: 0, maximum: 1, nullable: true }
        positiveRate: { type: number, minimum: 0, maximum: 1, nullable: true }
        lastRunAt: { type: string, nullable: true }
    CopilotFallbackReasonCount:
      type: object
      required: [reason, count]
      properties:
        reason:
          $ref: '#/components/schemas/CopilotFallbackReason'
        count: { type: integer, minimum: 0 }
    CopilotFlaggedRun:
      type: object
      required:
        [
          sessionId,
          userMessageId,
          assistantMessageId,
          promptVersion,
          question,
          answerPreview,
          feedbackVote,
          feedbackNote,
          fallbackReason,
          responseMs,
          totalTokens,
          estimatedCostUsd,
          createdAt,
        ]
      properties:
        sessionId: { type: string, format: uuid }
        userMessageId: { type: string, format: uuid }
        assistantMessageId: { type: string, format: uuid }
        promptVersion: { type: string }
        question: { type: string }
        answerPreview: { type: string }
        feedbackVote:
          type: string
          nullable: true
          enum: [up, down]
        feedbackNote: { type: string, nullable: true }
        fallbackReason:
          allOf:
            - $ref: '#/components/schemas/CopilotFallbackReason'
          nullable: true
        responseMs: { type: integer, minimum: 0 }
        totalTokens: { type: integer, minimum: 0, nullable: true }
        estimatedCostUsd: { type: number, minimum: 0, nullable: true }
        createdAt: { type: string }
    CopilotEvalOverview:
      type: object
      required:
        [
          activeCases,
          totalBatches,
          lastRunAt,
          latestPromptVersion,
          latestPassRate,
          latestAvgCitationRecall,
          latestAvgCitationPrecision,
        ]
      properties:
        activeCases: { type: integer, minimum: 0 }
        totalBatches: { type: integer, minimum: 0 }
        lastRunAt: { type: string, nullable: true }
        latestPromptVersion: { type: string, nullable: true }
        latestPassRate: { type: number, minimum: 0, maximum: 1, nullable: true }
        latestAvgCitationRecall: { type: number, minimum: 0, maximum: 1, nullable: true }
        latestAvgCitationPrecision: { type: number, minimum: 0, maximum: 1, nullable: true }
    CopilotEvalBatch:
      type: object
      required:
        [
          batchId,
          triggerType,
          promptVersion,
          totalCases,
          passedCases,
          groundedCases,
          fallbackCases,
          passRate,
          avgCitationRecall,
          avgCitationPrecision,
          avgResponseMs,
          totalTokens,
          totalEstimatedCostUsd,
          createdAt,
        ]
      properties:
        batchId: { type: string, format: uuid }
        triggerType: { type: string }
        promptVersion: { type: string }
        totalCases: { type: integer, minimum: 0 }
        passedCases: { type: integer, minimum: 0 }
        groundedCases: { type: integer, minimum: 0 }
        fallbackCases: { type: integer, minimum: 0 }
        passRate: { type: number, minimum: 0, maximum: 1, nullable: true }
        avgCitationRecall: { type: number, minimum: 0, maximum: 1, nullable: true }
        avgCitationPrecision: { type: number, minimum: 0, maximum: 1, nullable: true }
        avgResponseMs: { type: integer, minimum: 0 }
        totalTokens: { type: integer, minimum: 0 }
        totalEstimatedCostUsd: { type: number, minimum: 0 }
        createdAt: { type: string }
    CopilotEvalFailure:
      type: object
      required:
        [
          batchId,
          evalCaseSlug,
          evalCaseTitle,
          question,
          promptVersion,
          grounded,
          fallbackReason,
          expectedCaseSlugs,
          actualCitationSlugs,
          citationRecall,
          citationPrecision,
          answerPreview,
          createdAt,
        ]
      properties:
        batchId: { type: string, format: uuid }
        evalCaseSlug: { type: string }
        evalCaseTitle: { type: string }
        question: { type: string }
        promptVersion: { type: string }
        grounded: { type: boolean }
        fallbackReason:
          allOf:
            - $ref: '#/components/schemas/CopilotFallbackReason'
          nullable: true
        expectedCaseSlugs:
          type: array
          items: { type: string }
        actualCitationSlugs:
          type: array
          items: { type: string }
        citationRecall: { type: number, minimum: 0, maximum: 1, nullable: true }
        citationPrecision: { type: number, minimum: 0, maximum: 1, nullable: true }
        answerPreview: { type: string }
        createdAt: { type: string }
    CopilotEvalAdminMetrics:
      type: object
      required: [overview, recentBatches, latestFailures]
      properties:
        overview:
          $ref: '#/components/schemas/CopilotEvalOverview'
        recentBatches:
          type: array
          items:
            $ref: '#/components/schemas/CopilotEvalBatch'
        latestFailures:
          type: array
          items:
            $ref: '#/components/schemas/CopilotEvalFailure'
    CopilotAdminMetrics:
      type: object
      required: [overview, feedbackEval, byPromptVersion, byFallbackReason, recentFlags, evals]
      properties:
        overview:
          $ref: '#/components/schemas/CopilotOverviewStats'
        feedbackEval:
          $ref: '#/components/schemas/CopilotFeedbackEval'
        byPromptVersion:
          type: array
          items:
            $ref: '#/components/schemas/CopilotPromptVersionStats'
        byFallbackReason:
          type: array
          items:
            $ref: '#/components/schemas/CopilotFallbackReasonCount'
        recentFlags:
          type: array
          items:
            $ref: '#/components/schemas/CopilotFlaggedRun'
        evals:
          $ref: '#/components/schemas/CopilotEvalAdminMetrics'
    AdminStatsResponse:
      type: object
      required:
        - totalPublished
        - totalFundingUsd
        - totalDraft
        - avgFundingUsd
        - byIndustry
        - byCountry
        - byYear
        - byFailureReason
        - recentlyAdded
        - pendingReviews
        - ingestionStats
        - copilot
      properties:
        totalPublished: { type: integer, minimum: 0 }
        totalFundingUsd: { type: number, minimum: 0 }
        totalDraft: { type: integer, minimum: 0 }
        avgFundingUsd: { type: number, minimum: 0 }
        byIndustry:
          type: array
          items:
            type: object
            required: [industry, count, totalFunding]
            properties:
              industry: { type: string }
              count: { type: integer, minimum: 0 }
              totalFunding: { type: number, minimum: 0 }
        byCountry:
          type: array
          items:
            type: object
            required: [country, count]
            properties:
              country: { type: string }
              count: { type: integer, minimum: 0 }
        byYear:
          type: array
          items:
            type: object
            required: [year, count]
            properties:
              year: { type: integer }
              count: { type: integer, minimum: 0 }
        byFailureReason:
          type: array
          items:
            type: object
            required: [reason, count]
            properties:
              reason: { type: string }
              count: { type: integer, minimum: 0 }
        recentlyAdded:
          type: array
          items:
            type: object
            required: [id, slug, companyName, createdAt]
            properties:
              id: { type: string, format: uuid }
              slug: { type: string }
              companyName: { type: string }
              createdAt: { type: string }
        pendingReviews: { type: integer, minimum: 0 }
        ingestionStats:
          type: object
          required: [pending, running, failed, completed]
          properties:
            pending: { type: integer, minimum: 0 }
            running: { type: integer, minimum: 0 }
            failed: { type: integer, minimum: 0 }
            completed: { type: integer, minimum: 0 }
        copilot:
          $ref: '#/components/schemas/CopilotAdminMetrics'
    SchedulerJob:
      type: object
      required: [id, name, source_name, cron_expr, enabled]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        source_name: { type: string }
        cron_expr: { type: string }
        enabled: { type: boolean }
        last_run_at: { type: string, nullable: true }
        next_run_at: { type: string, nullable: true }
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: ok
  /health/ready:
    get:
      summary: Readiness (PostgreSQL ping when configured)
      responses:
        '200':
          description: ok or db skipped
        '503':
          description: database unreachable
  /v1/cases:
    get:
      summary: List cases
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: industry
          schema: { type: string }
        - in: query
          name: country
          description: ISO 3166-1 alpha-2
          schema: { type: string, minLength: 2, maxLength: 2 }
        - in: query
          name: closedYear
          schema: { type: integer }
        - in: query
          name: businessModelKey
          description: 与 cases.business_model_key 精确匹配（小写）
          schema: { type: string, minLength: 1, maxLength: 100 }
        - in: query
          name: primaryFailureReasonKey
          description: 与 cases.primary_failure_reason_key 精确匹配（小写）
          schema: { type: string, minLength: 1, maxLength: 100 }
        - in: query
          name: sort
          description: >-
            有关键词 q 时默认按相关度：服务端若配置 OPENAI_API_KEY 且 case 有向量，
            则混合 pg_trgm 与向量余弦（各约 0.5 权重）；否则仅 trgm。可改为 updated_at。
            无 q 时默认按更新时间。
          schema:
            type: string
            enum: [relevance, updated_at]
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Case list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCasesResponse'
  /v1/cases/by-slug/{slug}:
    get:
      summary: Get published case by URL slug
      description: >-
        Same response shape as GET /v1/cases/{id}. Slug is case-insensitive
        (stored as citext).
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string, minLength: 1, maxLength: 200 }
      responses:
        '200':
          description: Case detail with evidence + failure factors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseDetail'
        '400':
          description: Invalid slug
        '404':
          description: Not found
  /v1/cases/{id}:
    get:
      summary: Get case detail
      description: >-
        Includes evidenceSources[] and failureFactors[] for structured
        failure intelligence.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Case detail with evidence + failure factors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseDetail'
        '404':
          description: Not found
  /v1/cases/{id}/similar:
    get:
      summary: Similar published cases (vector cosine distance)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 20, default: 6 }
      responses:
        '200':
          description: List of similar cases (empty if anchor has no embedding)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimilarCasesResponse'
        '400':
          description: Invalid id or query
  /v1/meta/taxonomy:
    get:
      summary: >-
        Label maps for industries, countries, business models, primary failure
        reasons, failure-factor taxonomy, and timeline event types
      responses:
        '200':
          description: Taxonomy label maps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxonomyResponse'
  /v1/meta/home-summary:
    get:
      summary: Homepage aggregate metrics for the public discovery view
      responses:
        '200':
          description: Published case summary metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeSummary'
  /v1/meta/research-overview:
    get:
      summary: Aggregated research overview for topic and trend discovery pages
      responses:
        '200':
          description: Published case aggregates grouped for research workflows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchOverview'
  /v1/auth/register:
    post:
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8, maxLength: 128 }
                displayName: { type: string, minLength: 1, maxLength: 100 }
      responses:
        '201':
          description: Authenticated session payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid body
        '409':
          description: Email already registered
  /v1/auth/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 1 }
      responses:
        '200':
          description: Authenticated session payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid body
        '401':
          description: Invalid credentials
  /v1/auth/refresh:
    post:
      summary: Rotate refresh token and issue a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string, minLength: 1 }
      responses:
        '200':
          description: Authenticated session payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid body
        '401':
          description: Token expired or not found
  /v1/auth/logout:
    post:
      summary: Logout current user session
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out
        '401':
          description: Unauthorized
  /v1/auth/me:
    get:
      summary: Get current user profile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized
        '404':
          description: User not found
  /v1/copilot/answer:
    post:
      summary: Grounded failure-intelligence answer within a persisted research session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visitorId, question]
              properties:
                visitorId: { type: string, minLength: 8, maxLength: 100 }
                sessionId: { type: string, format: uuid }
                question: { type: string, minLength: 2, maxLength: 1000 }
                topK: { type: integer, minimum: 1, maximum: 10, default: 5 }
                pinnedCaseIds:
                  type: array
                  maxItems: 8
                  items: { type: string, format: uuid }
      responses:
        '200':
          description: Answer with citations and groundedness flag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotAnswerResponse'
        '400':
          description: Invalid body
        '404':
          description: Session not found
  /v1/copilot/sessions:
    get:
      summary: List recent Copilot research sessions for a visitor
      parameters:
        - in: query
          name: visitorId
          required: true
          schema: { type: string, minLength: 8, maxLength: 100 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 30, default: 12 }
      responses:
        '200':
          description: Recent Copilot sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotSessionsListResponse'
    post:
      summary: Create a new empty Copilot research session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visitorId]
              properties:
                visitorId: { type: string, minLength: 8, maxLength: 100 }
                title: { type: string, minLength: 1, maxLength: 120 }
      responses:
        '200':
          description: Empty research session detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotSessionDetail'
  /v1/copilot/sessions/{sessionId}:
    get:
      summary: Load a Copilot session with pinned cases and message history
      parameters:
        - in: path
          name: sessionId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: visitorId
          required: true
          schema: { type: string, minLength: 8, maxLength: 100 }
      responses:
        '200':
          description: Copilot session detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotSessionDetail'
        '404':
          description: Session not found
  /v1/copilot/sessions/{sessionId}/pins:
    post:
      summary: Pin a published case into the active Copilot session context
      parameters:
        - in: path
          name: sessionId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visitorId, caseId]
              properties:
                visitorId: { type: string, minLength: 8, maxLength: 100 }
                caseId: { type: string, format: uuid }
      responses:
        '200':
          description: Updated Copilot session detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotSessionDetail'
        '404':
          description: Session or case not found
  /v1/copilot/sessions/{sessionId}/pins/{caseId}:
    delete:
      summary: Remove a pinned case from the active Copilot session
      parameters:
        - in: path
          name: sessionId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: caseId
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: visitorId
          required: true
          schema: { type: string, minLength: 8, maxLength: 100 }
      responses:
        '200':
          description: Updated Copilot session detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotSessionDetail'
        '404':
          description: Session not found
  /v1/copilot/messages/{messageId}/feedback:
    post:
      summary: Save user feedback on a Copilot assistant message
      parameters:
        - in: path
          name: messageId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visitorId, vote]
              properties:
                visitorId: { type: string, minLength: 8, maxLength: 100 }
                vote:
                  type: string
                  enum: [up, down]
                note: { type: string, minLength: 1, maxLength: 500 }
      responses:
        '200':
          description: Saved feedback payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopilotFeedbackResponse'
        '404':
          description: Message not found
  /v1/payments/checkout:
    post:
      summary: Create a Stripe checkout session for Pro subscription
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId: { type: string, format: uuid }
      responses:
        '200':
          description: Checkout session URL
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url: { type: string }
        '400':
          description: Invalid body
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '503':
          description: Stripe not configured
  /v1/payments/portal:
    post:
      summary: Create a Stripe billing portal session for the current user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Billing portal URL
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url: { type: string }
        '401':
          description: Unauthorized
        '409':
          description: Billing portal unavailable because the user has no Stripe customer yet
        '503':
          description: Stripe not configured
  /v1/payments/webhook:
    post:
      summary: Stripe webhook endpoint for subscription state changes
      responses:
        '200':
          description: Event accepted
        '400':
          description: Missing or invalid Stripe signature
        '503':
          description: Stripe or database unavailable
  /v1/watchlist/me:
    get:
      summary: List the current user's saved watchlist cases
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current watchlist and entitlement summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistListResponse'
        '401':
          description: Unauthorized
        '404':
          description: User not found
  /v1/watchlist/me/status:
    get:
      summary: Check whether a case is already saved in the current user's watchlist
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: caseId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Watchlist membership for the requested case
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistStatusResponse'
        '400':
          description: Invalid query
        '401':
          description: Unauthorized
        '404':
          description: User not found
  /v1/watchlist/items:
    post:
      summary: Save a published case into the current user's watchlist
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [caseId]
              properties:
                caseId: { type: string, format: uuid }
      responses:
        '200':
          description: Watchlist mutation succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistMutationResponse'
        '400':
          description: Invalid body
        '401':
          description: Unauthorized
        '403':
          description: Entitlement required
        '404':
          description: Case or user not found
        '409':
          description: Watchlist limit reached
  /v1/watchlist/items/{caseId}:
    delete:
      summary: Remove a case from the current user's watchlist
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: caseId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Watchlist mutation succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistMutationResponse'
        '400':
          description: Invalid path parameter
        '401':
          description: Unauthorized
        '404':
          description: User not found
  /v1/saved-views/me:
    get:
      summary: List the current user's saved research views
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Saved views and entitlement summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedViewListResponse'
        '401':
          description: Unauthorized
        '404':
          description: User not found
  /v1/saved-views/items:
    post:
      summary: Save the current case filters as a reusable research view
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, filters]
              properties:
                name: { type: string, minLength: 1, maxLength: 80 }
                filters:
                  $ref: '#/components/schemas/SavedViewFilters'
      responses:
        '200':
          description: Saved view created or deduplicated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSavedViewResponse'
        '400':
          description: Invalid body
        '401':
          description: Unauthorized
        '403':
          description: Entitlement required
        '404':
          description: User not found
        '409':
          description: Saved view limit reached
  /v1/saved-views/items/{savedViewId}:
    patch:
      summary: Rename or overwrite a saved research view
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: savedViewId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 1, maxLength: 80 }
                filters:
                  $ref: '#/components/schemas/SavedViewFilters'
      responses:
        '200':
          description: Saved view updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateSavedViewResponse'
        '400':
          description: Invalid body or path parameter
        '401':
          description: Unauthorized
        '403':
          description: Entitlement required
        '404':
          description: Saved view or user not found
        '409':
          description: Duplicate saved view
    delete:
      summary: Delete a saved research view
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: savedViewId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Saved view deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSavedViewResponse'
        '400':
          description: Invalid path parameter
        '401':
          description: Unauthorized
        '404':
          description: User not found
  /v1/admin/reviews:
    get:
      summary: List reviews
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [pending, changes_requested, approved, rejected] }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Review list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListReviewsResponse'
        '401':
          description: When ADMIN_API_KEY is set but missing/invalid
        '503':
          description: Admin API disabled because ADMIN_API_KEY is unset
  /v1/admin/reviews/{id}/approve:
    post:
      summary: Approve a review
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApproveReviewSuccess'
        '409':
          description: Publish requirements are not met
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApproveReviewBlocked'
        '401':
          description: Unauthorized
        '503':
          description: Admin API disabled
  /v1/admin/reviews/{id}/request-changes:
    post:
      summary: Mark a review as changes requested
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewRequestChangesBody'
      responses:
        '200':
          description: Changes requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewRequestChangesResponse'
        '401':
          description: Unauthorized
        '503':
          description: Admin API disabled
  /v1/admin/reviews/{id}/resubmit:
    post:
      summary: Move a changes_requested review back to pending
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Resubmitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResubmitResponse'
        '401':
          description: Unauthorized
        '503':
          description: Admin API disabled
  /v1/admin/reviews/{id}/reject:
    post:
