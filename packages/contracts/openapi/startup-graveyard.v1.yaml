          description: Admin API disabled
  /v1/admin/ingestion-jobs:
    get:
      summary: Recent ingestion jobs
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 30 }
        - in: query
          name: status
          schema:
            type: string
            enum: [queued, running, succeeded, failed]
      responses:
        '200':
          description: Job list
        '401':
          description: Unauthorized
        '503':
          description: Admin API disabled
    post:
      summary: Enqueue ingestion job (queued status)
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceName, triggerType]
              properties:
                sourceName: { type: string, maxLength: 200 }
                triggerType: { type: string, maxLength: 80 }
                payload: { type: object, additionalProperties: true }
      responses:
        '200':
          description: Created job id
        '400':
          description: Invalid body
        '401':
          description: Unauthorized
        '503':
          description: Admin API disabled
