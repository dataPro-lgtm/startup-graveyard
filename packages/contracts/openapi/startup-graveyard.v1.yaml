    post:
      summary: >-
        Reset ingestion_jobs stuck in running (started_at older than threshold) back to
        queued; audit ingestion.jobs_reclaimed_stale
      security:
        - AdminKey: []
      parameters:
        - in: query
          name: maxRunningMinutes
          schema: { type: integer, minimum: 1, maximum: 10080, default: 30 }
      responses:
        '200':
          description: '{ reclaimed, jobIds[] }'
        '400':
          description: Invalid query
        '401':
          description: Unauthorized
        '503':
          description: Admin API disabled
  /v1/admin/ingestion-jobs/process-next:
    post:
      summary: >-
        Claim next queued job (SKIP LOCKED), run processor (echo / fetch_title /
        create_draft / pipeline_url_draft / backfill_case_taxonomy /
        run_copilot_eval_suite / upsert_embedding_stub / noop), then succeeded
        or failed; audit job_succeeded or job_failed
      security:
        - AdminKey: []
      responses:
        '200':
          description: >-
            Either { ok:true, job } after success, or { ok:false, reason:empty_queue }
        '401':
          description: Unauthorized
        '503':
          description: Admin API disabled
  /v1/admin/scheduler:
    get:
      summary: List scheduled ingestion/maintenance jobs
      security:
        - AdminKey: []
      responses:
        '200':
          description: Scheduler jobs
          content:
            application/json:
              schema:
                type: object
                required: [jobs]
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/SchedulerJob'
        '401':
          description: Unauthorized
        '503':
          description: Admin API disabled
  /v1/admin/scheduler/trigger:
    post:
      summary: >-
        Trigger a scheduled job immediately by job name or source name
        (for example pipeline_url_draft / extract_case_signals /
        backfill_case_search_index / backfill_case_taxonomy /
        run_copilot_eval_suite)
      security:
        - AdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobName: { type: string, minLength: 1 }
                sourceName: { type: string, minLength: 1 }
                payload:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Ingestion trigger result
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [ok]
                    properties:
                      ok: { type: boolean, enum: [true] }
                      detail: { type: string }
                  - type: object
                    required: [ok, error]
                    properties:
                      ok: { type: boolean, enum: [false] }
                      error: { type: string }
        '400':
          description: Invalid body
        '401':
          description: Unauthorized
        '404':
          description: Job not found
        '503':
          description: Admin API disabled
  /v1/admin/scheduler/{id}/toggle:
    patch:
      summary: Enable or disable a scheduled job
      security:
        - AdminKey: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Updated scheduler enabled state
          content:
            application/json:
              schema:
                type: object
                required: [enabled]
                properties:
                  enabled: { type: boolean }
        '401':
          description: Unauthorized
        '404':
          description: Job not found
        '503':
          description: Admin API disabled
