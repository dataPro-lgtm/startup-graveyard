openapi: 3.1.0
info:
  title: Startup Graveyard API
  version: 1.0.0
servers:
  - url: http://localhost:8080
components:
  securitySchemes:
    AdminKey:
      type: apiKey
      in: header
      name: X-Admin-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CaseListItem:
      type: object
      required:
        - id
        - slug
        - companyName
        - industry
        - country
        - closedYear
        - summary
        - businessModelKey
        - foundedYear
        - totalFundingUsd
        - primaryFailureReasonKey
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        companyName: { type: string }
        industry: { type: string }
        country: { type: string, nullable: true }
        closedYear: { type: integer, nullable: true }
        summary: { type: string }
        businessModelKey: { type: string, nullable: true }
        foundedYear: { type: integer, nullable: true }
        totalFundingUsd: { type: number, nullable: true }
        primaryFailureReasonKey: { type: string, nullable: true }
    EvidenceSource:
      type: object
      required:
        - id
        - sourceType
        - title
        - url
        - publisher
        - publishedAt
        - credibilityLevel
        - excerpt
      properties:
        id: { type: string, format: uuid }
        sourceType: { type: string }
        title: { type: string }
        url: { type: string }
        publisher: { type: string, nullable: true }
        publishedAt: { type: string, nullable: true }
        credibilityLevel: { type: string }
        excerpt: { type: string, nullable: true }
    FailureFactor:
      type: object
      required:
        - id
        - level1Key
        - level2Key
        - level3Key
        - weight
        - explanation
      properties:
        id: { type: string, format: uuid }
        level1Key: { type: string }
        level2Key: { type: string }
        level3Key: { type: string, nullable: true }
        weight: { type: number }
        explanation: { type: string, nullable: true }
    CaseDetail:
      allOf:
        - $ref: '#/components/schemas/CaseListItem'
        - type: object
          required: [evidenceSources, failureFactors]
          properties:
            evidenceSources:
              type: array
              items: { $ref: '#/components/schemas/EvidenceSource' }
            failureFactors:
              type: array
              items: { $ref: '#/components/schemas/FailureFactor' }
    ListCasesResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/CaseListItem' }
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
    SimilarCasesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/CaseListItem' }
    TaxonomyResponse:
      type: object
      required:
        - industries
        - countries
        - businessModels
        - primaryFailureReasons
        - failureFactorLevel1
        - failureFactorLevel2
        - timelineEventTypes
      properties:
        industries:
          type: object
          additionalProperties: { type: string }
        countries:
          type: object
          additionalProperties: { type: string }
        businessModels:
          type: object
          additionalProperties: { type: string }
        primaryFailureReasons:
          type: object
          additionalProperties: { type: string }
        failureFactorLevel1:
          type: object
          additionalProperties: { type: string }
        failureFactorLevel2:
          type: object
          additionalProperties: { type: string }
        timelineEventTypes:
          type: object
          additionalProperties: { type: string }
    HomeSummary:
      type: object
      required: [totalCases, totalFundingUsd, failurePatterns]
      properties:
        totalCases: { type: integer, minimum: 0 }
        totalFundingUsd: { type: number, minimum: 0 }
        failurePatterns: { type: integer, minimum: 0 }
    ResearchBucket:
      type: object
      required: [key, caseCount, totalFundingUsd]
      properties:
        key: { type: string }
        caseCount: { type: integer, minimum: 0 }
        totalFundingUsd: { type: number, minimum: 0 }
    ResearchTimelinePoint:
      type: object
      required: [year, caseCount, totalFundingUsd]
      properties:
        year: { type: integer }
        caseCount: { type: integer, minimum: 0 }
        totalFundingUsd: { type: number, minimum: 0 }
    ResearchOverview:
      type: object
      required:
        - summary
        - topIndustries
        - topCountries
        - topFailureReasons
        - closureTimeline
      properties:
        summary:
          $ref: '#/components/schemas/HomeSummary'
        topIndustries:
          type: array
          items:
            $ref: '#/components/schemas/ResearchBucket'
        topCountries:
          type: array
          items:
            $ref: '#/components/schemas/ResearchBucket'
        topFailureReasons:
          type: array
          items:
            $ref: '#/components/schemas/ResearchBucket'
        closureTimeline:
          type: array
          items:
            $ref: '#/components/schemas/ResearchTimelinePoint'
    ReviewPublishReadiness:
      type: object
      required: [ready, evidenceCount, failureFactorCount, missing]
      properties:
        ready: { type: boolean }
        evidenceCount: { type: integer, minimum: 0 }
        failureFactorCount: { type: integer, minimum: 0 }
        missing:
          type: array
          items:
            type: string
            enum: [evidence_sources, failure_factors]
    ReviewListItem:
      type: object
      required:
        - id
        - caseId
        - slug
        - companyName
        - reviewStatus
        - assignedTo
        - decisionNote
        - createdAt
        - approvedAt
        - publishReadiness
      properties:
        id: { type: string, format: uuid }
        caseId: { type: string, format: uuid }
        slug: { type: string }
        companyName: { type: string }
        reviewStatus:
          type: string
          enum: [pending, changes_requested, approved, rejected]
        assignedTo: { type: string, nullable: true }
        decisionNote: { type: string, nullable: true }
        createdAt: { type: string }
        approvedAt: { type: string, nullable: true }
        publishReadiness:
          $ref: '#/components/schemas/ReviewPublishReadiness'
    ListReviewsResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReviewListItem'
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1 }
        total: { type: integer, minimum: 0 }
    ApproveReviewSuccess:
      type: object
      required: [ok, reviewId, caseId, status, approvedAt]
      properties:
        ok: { type: boolean, const: true }
        reviewId: { type: string, format: uuid }
        caseId: { type: string, format: uuid }
        status: { type: string, const: approved }
        approvedAt: { type: string }
    ApproveReviewBlocked:
      type: object
      required: [error, caseId, publishReadiness]
      properties:
        error: { type: string, const: publish_requirements_not_met }
        caseId: { type: string, format: uuid }
        publishReadiness:
          $ref: '#/components/schemas/ReviewPublishReadiness'
    ReviewRequestChangesBody:
      type: object
      required: [decisionNote]
      properties:
        decisionNote: { type: string, minLength: 1, maxLength: 4000 }
    ReviewRequestChangesResponse:
      type: object
      required: [reviewId, caseId, status]
      properties:
        reviewId: { type: string, format: uuid }
        caseId: { type: string, format: uuid }
        status: { type: string, const: changes_requested }
    ReviewResubmitResponse:
      type: object
      required: [reviewId, caseId, status]
      properties:
        reviewId: { type: string, format: uuid }
        caseId: { type: string, format: uuid }
        status: { type: string, const: pending }
    ReviewRejectResponse:
      type: object
      required: [reviewId, caseId, status]
      properties:
        reviewId: { type: string, format: uuid }
        caseId: { type: string, format: uuid }
        status: { type: string, const: rejected }
    SourceSnapshotItem:
      type: object
      required:
        - id
        - sourceName
        - sourceUrl
        - finalUrl
        - httpStatus
        - contentType
        - title
        - excerpt
        - contentSha256
        - metadata
        - fetchedAt
        - createdAt
      properties:
        id: { type: string, format: uuid }
        sourceName: { type: string }
        sourceUrl: { type: string }
        finalUrl: { type: string }
        httpStatus: { type: integer, minimum: 100, maximum: 599 }
        contentType: { type: string, nullable: true }
        title: { type: string, nullable: true }
        excerpt: { type: string, nullable: true }
        contentSha256: { type: string }
        metadata:
          type: object
          additionalProperties: true
        fetchedAt: { type: string }
        createdAt: { type: string }
    ListSourceSnapshotsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SourceSnapshotItem'
    UserEntitlements:
      type: object
      required:
        [
          watchlistLimit,
          savedSearchLimit,
          monthlyCopilotQuestions,
          canExportReports,
          canUseSavedSearches,
          canUseWatchlist,
          canUseTeamWorkspace,
          canUseApiAccess,
        ]
      properties:
        watchlistLimit: { type: integer, minimum: 0 }
        savedSearchLimit: { type: integer, minimum: 0 }
        monthlyCopilotQuestions: { type: integer, minimum: 0, nullable: true }
        canExportReports: { type: boolean }
        canUseSavedSearches: { type: boolean }
        canUseWatchlist: { type: boolean }
        canUseTeamWorkspace: { type: boolean }
        canUseApiAccess: { type: boolean }
    WorkspaceAccessSource:
      type: string
      enum: [personal, team_workspace]
    WorkspaceAccessRole:
      type: string
      enum: [owner, admin, member]
    WorkspaceAccessWarning:
      type: string
      enum: [workspace_plan_inactive, past_due, cancel_at_period_end, seat_limit_reached]
    WorkspaceAccess:
      type: object
      required:
        [
          source,
          workspaceId,
          workspaceName,
          workspaceRole,
          inheritedFromUserId,
          inheritedFromName,
          effectiveSubscription,
          effectiveBillingStatus,
          warningCodes,
        ]
      properties:
        source:
          $ref: '#/components/schemas/WorkspaceAccessSource'
        workspaceId: { type: string, format: uuid, nullable: true }
        workspaceName: { type: string, nullable: true }
        workspaceRole:
          allOf:
            - $ref: '#/components/schemas/WorkspaceAccessRole'
          nullable: true
        inheritedFromUserId: { type: string, format: uuid, nullable: true }
        inheritedFromName: { type: string, nullable: true }
        effectiveSubscription:
          $ref: '#/components/schemas/SubscriptionTier'
        effectiveBillingStatus:
          $ref: '#/components/schemas/BillingStatus'
        warningCodes:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceAccessWarning'
    UserProfile:
      type: object
      required:
        [
          id,
          email,
          displayName,
          subscription,
          billingStatus,
          effectiveSubscription,
          effectiveBillingStatus,
          billingInterval,
          currentPeriodEnd,
          cancelAtPeriodEnd,
          entitlements,
          workspaceAccess,
          role,
          createdAt,
        ]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string, nullable: true }
        subscription:
          type: string
          enum: [free, pro, team]
        billingStatus:
          type: string
          enum: [inactive, trialing, active, past_due, canceled]
        effectiveSubscription:
          $ref: '#/components/schemas/SubscriptionTier'
        effectiveBillingStatus:
          $ref: '#/components/schemas/BillingStatus'
        billingInterval:
          type: string
          nullable: true
          enum: [month, year]
        currentPeriodEnd: { type: string, nullable: true }
        cancelAtPeriodEnd: { type: boolean }
        entitlements:
          $ref: '#/components/schemas/UserEntitlements'
        workspaceAccess:
          $ref: '#/components/schemas/WorkspaceAccess'
        role:
          type: string
          enum: [user, admin]
        createdAt: { type: string }
    AuthResponse:
      type: object
      required: [user, accessToken, refreshToken, expiresIn]
      properties:
        user:
          $ref: '#/components/schemas/UserProfile'
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer, minimum: 1 }
    WatchlistSummary:
      type: object
      required:
        [
          subscription,
          billingStatus,
          watchlistCount,
          watchlistLimit,
          remainingSlots,
          canUseWatchlist,
          canAddMore,
          requiredTier,
        ]
      properties:
        subscription:
          type: string
          enum: [free, pro, team]
        billingStatus:
          type: string
          enum: [inactive, trialing, active, past_due, canceled]
        watchlistCount: { type: integer, minimum: 0 }
        watchlistLimit: { type: integer, minimum: 0 }
        remainingSlots: { type: integer, minimum: 0 }
        canUseWatchlist: { type: boolean }
        canAddMore: { type: boolean }
        requiredTier:
          type: string
          nullable: true
          enum: [free, pro, team]
    WatchlistItem:
      allOf:
        - $ref: '#/components/schemas/CaseListItem'
        - type: object
          required: [addedAt]
          properties:
            addedAt: { type: string }
    WatchlistListResponse:
      type: object
      required: [summary, items]
      properties:
        summary:
          $ref: '#/components/schemas/WatchlistSummary'
        items:
          type: array
          items:
            $ref: '#/components/schemas/WatchlistItem'
    WatchlistStatusResponse:
      type: object
      required: [summary, caseId, saved]
      properties:
        summary:
          $ref: '#/components/schemas/WatchlistSummary'
        caseId: { type: string, format: uuid }
        saved: { type: boolean }
    WatchlistMutationResponse:
      type: object
      required: [ok, summary, caseId, saved]
      properties:
        ok: { type: boolean, enum: [true] }
        summary:
          $ref: '#/components/schemas/WatchlistSummary'
        caseId: { type: string, format: uuid }
        saved: { type: boolean }
    SavedViewSummary:
      type: object
      required:
        [
          subscription,
          billingStatus,
          savedViewCount,
          savedViewLimit,
          remainingSlots,
          canUseSavedViews,
          canAddMore,
          requiredTier,
        ]
      properties:
        subscription:
          type: string
          enum: [free, pro, team]
        billingStatus:
          type: string
          enum: [inactive, trialing, active, past_due, canceled]
        savedViewCount: { type: integer, minimum: 0 }
        savedViewLimit: { type: integer, minimum: 0 }
        remainingSlots: { type: integer, minimum: 0 }
        canUseSavedViews: { type: boolean }
        canAddMore: { type: boolean }
        requiredTier:
          type: string
          nullable: true
          enum: [free, pro, team]
    SavedViewFilters:
      type: object
      properties:
        q: { type: string, minLength: 1, maxLength: 120 }
        industry: { type: string, minLength: 1, maxLength: 80 }
        country: { type: string, minLength: 1, maxLength: 32 }
        closedYear:
          type: string
          pattern: '^\d{4}$'
        businessModelKey: { type: string, minLength: 1, maxLength: 80 }
        primaryFailureReasonKey: { type: string, minLength: 1, maxLength: 80 }
        sort:
          type: string
          enum: [relevance, updated_at]
    SavedViewItem:
      type: object
      required: [id, name, filters, queryString, caseCount, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 80 }
        filters:
          $ref: '#/components/schemas/SavedViewFilters'
        queryString: { type: string }
        caseCount: { type: integer, minimum: 0 }
        createdAt: { type: string }
        updatedAt: { type: string }
    SavedViewListResponse:
      type: object
      required: [summary, items]
      properties:
        summary:
          $ref: '#/components/schemas/SavedViewSummary'
        items:
          type: array
          items:
            $ref: '#/components/schemas/SavedViewItem'
    CreateSavedViewResponse:
      type: object
      required: [ok, created, summary, item]
      properties:
        ok: { type: boolean, enum: [true] }
        created: { type: boolean }
        summary:
          $ref: '#/components/schemas/SavedViewSummary'
        item:
          $ref: '#/components/schemas/SavedViewItem'
    UpdateSavedViewResponse:
      type: object
      required: [ok, summary, item]
      properties:
        ok: { type: boolean, enum: [true] }
        summary:
          $ref: '#/components/schemas/SavedViewSummary'
        item:
          $ref: '#/components/schemas/SavedViewItem'
    DeleteSavedViewResponse:
      type: object
      required: [ok, summary, savedViewId]
      properties:
        ok: { type: boolean, enum: [true] }
        summary:
          $ref: '#/components/schemas/SavedViewSummary'
        savedViewId: { type: string, format: uuid }
    ExportResearchReportResponse:
      type: object
      required: [ok, filename, mimeType, title, caseCount, sampleSize, generatedAt, content]
      properties:
        ok: { type: boolean, enum: [true] }
        filename: { type: string }
        mimeType: { type: string, enum: ['text/markdown'] }
        title: { type: string }
        caseCount: { type: integer, minimum: 0 }
        sampleSize: { type: integer, minimum: 0 }
        generatedAt: { type: string }
        content: { type: string }
    ExportResearchReportPdfResponse:
      type: object
      required: [ok, filename, mimeType, title, caseCount, sampleSize, generatedAt, contentBase64]
      properties:
        ok: { type: boolean, enum: [true] }
        filename: { type: string }
        mimeType: { type: string, enum: ['application/pdf'] }
        title: { type: string }
        caseCount: { type: integer, minimum: 0 }
        sampleSize: { type: integer, minimum: 0 }
        generatedAt: { type: string }
        contentBase64: { type: string }
    ReportShareItem:
      type: object
      required:
        [
          id,
          savedViewId,
          savedViewName,
          filters,
          queryString,
          caseCount,
          shareToken,
          sharePath,
          shareUrl,
          lastAccessedAt,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: string, format: uuid }
        savedViewId: { type: string, format: uuid }
        savedViewName: { type: string, minLength: 1, maxLength: 80 }
        filters:
          $ref: '#/components/schemas/SavedViewFilters'
        queryString: { type: string }
        caseCount: { type: integer, minimum: 0 }
        shareToken:
          type: string
          minLength: 8
          maxLength: 64
          pattern: '^[a-z0-9]+$'
        sharePath: { type: string }
        shareUrl: { type: string, format: uri }
        lastAccessedAt:
          type: string
          nullable: true
        createdAt: { type: string }
        updatedAt: { type: string }
    ReportShareListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReportShareItem'
    CreateReportShareResponse:
      type: object
      required: [ok, created, item]
      properties:
        ok: { type: boolean, enum: [true] }
        created: { type: boolean }
        item:
          $ref: '#/components/schemas/ReportShareItem'
    DeleteReportShareResponse:
      type: object
      required: [ok, shareId]
      properties:
        ok: { type: boolean, enum: [true] }
        shareId: { type: string, format: uuid }
    PublicReportShareBriefCase:
      type: object
      required:
        [
          id,
          slug,
          companyName,
          industry,
          country,
          closedYear,
          totalFundingUsd,
          primaryFailureReasonKey,
          summary,
        ]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        companyName: { type: string }
        industry: { type: string }
        country:
          type: string
          nullable: true
        closedYear:
          type: integer
          nullable: true
        totalFundingUsd:
          type: number
          nullable: true
        primaryFailureReasonKey:
          type: string
          nullable: true
        summary: { type: string }
    PublicReportShareBrief:
      type: object
      required:
        [
          title,
          generatedAt,
          sourceViewUrl,
          sourceViewPath,
          filterSummary,
          totalMatchingCases,
          sampleSize,
          sampleFundingUsd,
          topIndustries,
          topFailureReasons,
          cases,
        ]
      properties:
        title: { type: string, minLength: 1, maxLength: 80 }
        generatedAt: { type: string }
        sourceViewUrl: { type: string, format: uri }
        sourceViewPath: { type: string }
        filterSummary:
          type: array
          items: { type: string }
        totalMatchingCases: { type: integer, minimum: 0 }
        sampleSize: { type: integer, minimum: 0 }
        sampleFundingUsd: { type: number, minimum: 0 }
        topIndustries:
          type: array
          items: { type: string }
        topFailureReasons:
          type: array
          items: { type: string }
        cases:
          type: array
          items:
            $ref: '#/components/schemas/PublicReportShareBriefCase'
    PublicReportShareResponse:
      type: object
      required: [share, brief]
      properties:
        share:
          type: object
          required:
            [
              id,
              shareToken,
              sharePath,
              shareUrl,
              savedViewId,
              savedViewName,
              ownerDisplayName,
              createdAt,
              updatedAt,
              lastAccessedAt,
            ]
          properties:
            id: { type: string, format: uuid }
            shareToken:
              type: string
              minLength: 8
              maxLength: 64
              pattern: '^[a-z0-9]+$'
            sharePath: { type: string }
            shareUrl: { type: string, format: uri }
            savedViewId: { type: string, format: uuid }
            savedViewName: { type: string, minLength: 1, maxLength: 80 }
            ownerDisplayName:
              type: string
              nullable: true
            createdAt: { type: string }
            updatedAt: { type: string }
            lastAccessedAt:
              type: string
              nullable: true
        brief:
          $ref: '#/components/schemas/PublicReportShareBrief'
    TeamWorkspaceRole:
      type: string
      enum: [owner, admin, member]
    TeamWorkspaceInviteStatus:
      type: string
      enum: [pending, accepted, revoked]
    TeamWorkspaceBillingWarning:
      type: string
      enum: [workspace_plan_inactive, past_due, cancel_at_period_end, seat_limit_reached]
    TeamWorkspaceBillingRecoveryActionCode:
      type: string
      enum:
        [
          upgrade_to_team,
          resume_team_subscription,
          update_payment_method,
          renew_team_subscription,
          free_up_seats,
        ]
    TeamWorkspaceBillingRecoveryActionSurface:
      type: string
      enum: [checkout, billing_portal, workspace_members]
    TeamWorkspaceBillingEventType:
      type: string
      enum:
        [
          workspace_plan_inactive,
          workspace_plan_restored,
          seat_capacity_reduced,
          seat_capacity_restored,
          invites_auto_revoked,
          members_fallback_started,
          members_fallback_cleared,
        ]
    TeamWorkspaceBillingEventSeverity:
      type: string
      enum: [info, warning, critical, success]
    TeamWorkspaceMember:
      type: object
      required: [userId, email, displayName, role, joinedAt]
      properties:
        userId: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string, nullable: true }
        role:
          $ref: '#/components/schemas/TeamWorkspaceRole'
        joinedAt: { type: string }
    TeamWorkspaceInvite:
      type: object
      required: [id, workspaceId, workspaceName, email, role, status, createdAt, acceptedAt]
      properties:
        id: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        workspaceName: { type: string }
        email: { type: string, format: email }
        role:
          type: string
          enum: [admin, member]
        status:
          $ref: '#/components/schemas/TeamWorkspaceInviteStatus'
        createdAt: { type: string }
        acceptedAt: { type: string, nullable: true }
    TeamWorkspaceSharedSavedView:
      allOf:
        - $ref: '#/components/schemas/SavedViewItem'
        - type: object
          required: [sourceSavedViewId, sharedByUserId, sharedByName, sharedAt]
          properties:
            sourceSavedViewId: { type: string, format: uuid }
            sharedByUserId: { type: string, format: uuid }
            sharedByName: { type: string, nullable: true }
            sharedAt: { type: string }
    TeamWorkspaceSharedCase:
      allOf:
        - $ref: '#/components/schemas/CaseListItem'
        - type: object
          required: [sharedByUserId, sharedByName, sharedAt]
          properties:
            sharedByUserId: { type: string, format: uuid }
            sharedByName: { type: string, nullable: true }
